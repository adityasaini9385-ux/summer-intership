<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        main {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        section {
            flex: 3;
            background-color: #f4f4f4;
            padding: 15px;
        }

        article {
            background-color: white;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        aside {
            flex: 1;
            background-color: #e9e9e9;
            padding: 15px;
        }

        footer {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website Header</h1>
    </header>

    <main>
        <section>
            <h2>Main Section</h2>

            <article>
                <h3>Article 1</h3>
                <p>This is the first article content.</p>
            </article>

            <article>
                <h3>Article 2</h3>
                <p>This is the second article content.</p>
            </article>
        </section>

        <aside>
            <h3>Sidebar</h3>
            <p>This is the aside content.</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 My Website Footer</p>
    </footer>

</body>
</html>
